services:

  # ---------------------------------------------------------------------
  # MongoDB — banco de dados principal da aplicação
  # Configuração: infra/mongodb/init-mongo.js
  #   (cria o banco "orders_db", a coleção "orders" e um índice único
  #   em "id" já na primeira subida do container)
  # ---------------------------------------------------------------------
  mongodb:
    image: mongo:7
    container_name: orders_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./infra/mongodb/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    networks:
      - order-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------
  # RabbitMQ — mensageria para notificação de pedido criado
  # Configuração: infra/rabbitmq/rabbitmq.conf + infra/rabbitmq/definitions.json
  #   (declara a fila "orders_created_queue" já na inicialização do broker)
  # ---------------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: orders_rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"   # protocolo AMQP
      - "15672:15672" # painel de gerenciamento (http://localhost:15672, guest/guest)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - ./infra/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./infra/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    networks:
      - order-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ---------------------------------------------------------------------
  # Zookeeper — coordenação do cluster Kafka 
  # ---------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: orders_zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - order-net
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | timeout 2 bash -c 'cat < /dev/tcp/localhost/2181' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ---------------------------------------------------------------------
  # Kafka — mensageria para publicação do evento de pedido criado
  # ---------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: orders_kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - order-net
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ---------------------------------------------------------------------
  # kafka-init — container auxiliar que cria explicitamente o tópico
  # "orders.created" (infra/kafka/create-topics.sh) e depois encerra.
  # Configuração: infra/kafka/create-topics.sh
  # ---------------------------------------------------------------------
  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: orders_kafka_init
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./infra/kafka/create-topics.sh:/usr/local/bin/create-topics.sh:ro
    entrypoint: ["sh", "/usr/local/bin/create-topics.sh"]
    networks:
      - order-net
    restart: "no"

  # ---------------------------------------------------------------------
  # api — FastAPI (gerenciamento de pedidos)
  # ---------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orders_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DB_NAME: orders_db
      MONGO_COLLECTION: orders
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: app_user
      RABBITMQ_PASSWORD: app_password
      RABBITMQ_QUEUE: orders_created_queue
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: orders.created
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - order-net

networks:
  order-net:
    driver: bridge

volumes:
  mongodb_data:
